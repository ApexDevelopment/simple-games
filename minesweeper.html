<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Simple Minesweeper</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="grotesk.css">
	<style>
		.page {
			min-height: 100vh;
			display: flex;
			flex-direction: column;
		}

		.shell {
			flex: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 32px 24px;
			gap: 16px;
		}

		.shell .title {
			font-family: var(--font-mark);
			font-size: clamp(24px, 4vw, 36px);
			margin: 0;
		}

		.nav a {
			display: inline-flex;
			align-items: center;
			font-size: 12px;
			text-decoration: none;
		}

		.controls {
			display: flex;
			gap: 14px;
			flex-wrap: wrap;
			justify-content: center;
			align-items: center;
		}

		.slider-group label {
			color: var(--text-dim);
		}

		.instructions {
			text-align: center;
			font-size: 12px;
			letter-spacing: 0.03em;
			line-height: 1.7;
			color: var(--text-dim);
		}

		#minesweeper-board {
			display: grid;
			grid-template-columns: repeat(9, 40px);
			grid-template-rows: repeat(9, 40px);
			border: 1px solid var(--line-strong);
			background: var(--panel);
			user-select: none;
			-webkit-user-select: none;
			touch-action: manipulation;
		}

		@media (max-width: 500px) {
			#minesweeper-board {
				grid-template-columns: repeat(9, 9vw);
				grid-template-rows: repeat(9, 9vw);
			}
		}

		.cell {
			width: 100%;
			height: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 1.1rem;
			font-weight: 700;
			border-right: 1px solid var(--line);
			border-bottom: 1px solid var(--line);
			box-sizing: border-box;
			cursor: pointer;
			background-color: var(--panel-2);
			color: var(--text);
		}

		.cell.last-col {
			border-right: none;
		}

		.cell.last-row {
			border-bottom: none;
		}

		.cell.revealed {
			background-color: var(--bg);
			cursor: default;
		}

		@media (hover: hover) {
			.cell:not(.revealed):hover {
				background-color: var(--bg-soft);
			}
		}

		.cell.flagged {
			color: var(--text);
		}

		.cell.mine {
			background-color: var(--danger);
			color: #fff;
		}

		.cell.exploded {
			background-color: var(--danger);
			color: #fff;
		}

		/* Number colors */
		.val-1 {
			color: #4f9dff;
		}

		.val-2 {
			color: #4caf50;
		}

		.val-3 {
			color: #ff6b6b;
		}

		.val-4 {
			color: #b388ff;
		}

		.val-5 {
			color: #ffb74d;
		}

		.val-6 {
			color: #4dd0e1;
		}

		.val-7 {
			color: var(--text);
		}

		.val-8 {
			color: var(--text-dim);
		}

		#status {
			margin-top: 4px;
			font-size: 13px;
			letter-spacing: 0.03em;
			height: 20px;
			text-align: center;
			color: var(--text-dim);
		}
	</style>
</head>

<body>
	<main class="page frame">
		<header class="topbar">
			<div class="wordmark">APEX⁂</div>
			<nav class="nav" aria-label="Primary">
				<a href="index.html" style="text-decoration:none"><span>/ Games</span></a>
				<span class="on">/ Minesweeper</span>
			</nav>
			<div class="meta">
				<button class="ui-switch" id="theme-toggle" type="button" role="switch" aria-checked="false">
					<span class="switch-label">Theme</span>
					<span class="switch-track" aria-hidden="true"><span class="switch-thumb"></span></span>
				</button>
				<button class="ui-switch" id="flat-toggle" type="button" role="switch" aria-checked="false">
					<span class="switch-label">Surfaces</span>
					<span class="switch-track" aria-hidden="true"><span class="switch-thumb"></span></span>
				</button>
			</div>
		</header>

		<section class="shell">
			<h1 class="title">Minesweeper</h1>

			<div class="controls">
				<button onclick="initGame()" class="kbtn kbtn-primary">New Game</button>
				<div class="slider-group" style="display:flex; flex-direction:column; gap:5px; margin: 0 10px;">
					<label for="sizeData" style="font-size: 11px; letter-spacing: 0.03em;">Size: <span id="sizeVal">9</span>x<span
							id="sizeVal2">9</span></label>
					<input type="range" class="ui-range" id="sizeData" min="8" max="20" value="9" oninput="updateSettings()">
				</div>
				<div class="slider-group" style="display:flex; flex-direction:column; gap:5px; margin: 0 10px;">
					<label for="diffData" style="font-size: 11px; letter-spacing: 0.03em;">Mines: <span
							id="diffVal">10</span>%</label>
					<input type="range" class="ui-range" id="diffData" min="10" max="30" value="12" oninput="updateSettings()">
				</div>
			</div>

			<div class="instructions">
				Click to reveal • Right-click to flag<br>
				On mobile: Long-press to flag
			</div>

			<div id="minesweeper-board">
			</div>

			<div id="status"></div>
		</section>
	</main>

	<script>
		const board = document.getElementById('minesweeper-board');
		const statusDiv = document.getElementById('status');
		const sizeInput = document.getElementById('sizeData');
		const diffInput = document.getElementById('diffData');
		const sizeVal = document.getElementById('sizeVal');
		const sizeVal2 = document.getElementById('sizeVal2');
		const diffVal = document.getElementById('diffVal');

		let ROWS = 9;
		let COLS = 9;
		let MINES = 10;
		const LONG_PRESS_DURATION = 500; // ms

		let grid = [];
		let gameOver = false;
		let firstClick = true;
		let flagsPlaced = 0;

		// Touch handling variables
		let longPressTimer;
		let isLongPress = false;
		let startX = 0;
		let startY = 0;

		window.onload = () => {
			initGame();
		};

		function updateSettings() {
			ROWS = parseInt(sizeInput.value);
			COLS = parseInt(sizeInput.value);
			// Difficulty is percentage of cells
			const percent = parseInt(diffInput.value);
			MINES = Math.floor((ROWS * COLS) * (percent / 100));

			sizeVal.innerText = ROWS;
			sizeVal2.innerText = COLS;
			diffVal.innerText = percent;

			initGame();
		}

		board.addEventListener('contextmenu', (e) => {
			e.preventDefault();
		});

		function initGame() {
			// Update params from sliders to be sure
			ROWS = parseInt(sizeInput.value);
			COLS = parseInt(sizeInput.value);
			const percent = parseInt(diffInput.value);
			MINES = Math.floor((ROWS * COLS) * (percent / 100));

			grid = [];
			board.innerHTML = '';

			// Dynamic Grid Styling
			board.style.gridTemplateColumns = `repeat(${COLS}, 40px)`;
			board.style.gridTemplateRows = `repeat(${ROWS}, 40px)`;

			// Adjust easier on mobile/small screens if grid is large
			if (window.innerWidth < 500) {
				board.style.gridTemplateColumns = `repeat(${COLS}, ${90 / COLS}vw)`;
				board.style.gridTemplateRows = `repeat(${ROWS}, ${90 / ROWS}vw)`;
			}

			gameOver = false;
			firstClick = true;
			flagsPlaced = 0;
			statusDiv.innerText = `Mines: ${MINES}`;
			statusDiv.style.color = 'var(--text-dim)';

			for (let r = 0; r < ROWS; r++) {
				let row = [];
				for (let c = 0; c < COLS; c++) {
					const cell = document.createElement('div');
					cell.classList.add('cell');
					cell.dataset.r = r;
					cell.dataset.c = c;

					if (c === COLS - 1) cell.classList.add('last-col');
					if (r === ROWS - 1) cell.classList.add('last-row');

					cell.addEventListener('mousedown', (e) => {
						if (e.button === 2) {
							handleRightClick(r, c);
						}
					});

					cell.addEventListener('click', (e) => {
						if (isLongPress) {
							isLongPress = false;
							e.preventDefault();
							e.stopImmediatePropagation();
							return;
						}
						handleLeftClick(r, c);
					});

					// Touch interactions for long press
					cell.addEventListener('touchstart', (e) => {
						if (gameOver || grid[r][c].revealed) return;
						isLongPress = false;
						startX = e.touches[0].clientX;
						startY = e.touches[0].clientY;

						longPressTimer = setTimeout(() => {
							isLongPress = true;
							if (window.navigator && window.navigator.vibrate) {
								window.navigator.vibrate(50);
							}
							handleRightClick(r, c);
						}, LONG_PRESS_DURATION);
					}, { passive: true });

					cell.addEventListener('touchend', (e) => {
						clearTimeout(longPressTimer);
					});

					cell.addEventListener('touchmove', (e) => {
						// Only cancel if moved significantly
						if (!longPressTimer) return;

						const x = e.touches[0].clientX;
						const y = e.touches[0].clientY;

						const diffX = Math.abs(x - startX);
						const diffY = Math.abs(y - startY);

						if (diffX > 10 || diffY > 10) {
							clearTimeout(longPressTimer);
							longPressTimer = null;
						}
					});

					board.appendChild(cell);
					row.push({
						element: cell,
						mine: false,
						revealed: false,
						flagged: false,
						count: 0
					});
				}
				grid.push(row);
			}
		}

		function placeMines(safeR, safeC) {
			let minesPlaced = 0;
			while (minesPlaced < MINES) {
				const r = Math.floor(Math.random() * ROWS);
				const c = Math.floor(Math.random() * COLS);

				if (grid[r][c].mine) continue;

				// Safe zone
				if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;

				grid[r][c].mine = true;
				minesPlaced++;
			}

			for (let r = 0; r < ROWS; r++) {
				for (let c = 0; c < COLS; c++) {
					if (!grid[r][c].mine) {
						let count = 0;
						for (let i = -1; i <= 1; i++) {
							for (let j = -1; j <= 1; j++) {
								const nr = r + i;
								const nc = c + j;
								if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc].mine) {
									count++;
								}
							}
						}
						grid[r][c].count = count;
					}
				}
			}
		}

		function handleLeftClick(r, c) {
			if (gameOver || grid[r][c].flagged) return;

			if (firstClick) {
				placeMines(r, c);
				firstClick = false;
			}

			reveal(r, c);
			checkWin();
		}

		function handleRightClick(r, c) {
			if (gameOver || grid[r][c].revealed) return;
			toggleFlag(r, c);
		}

		function toggleFlag(r, c) {
			if (grid[r][c].revealed) return;

			const cellObj = grid[r][c];
			cellObj.flagged = !cellObj.flagged;

			if (cellObj.flagged) {
				cellObj.element.classList.add('flagged');
				cellObj.element.innerText = '🚩';
				flagsPlaced++;
			} else {
				cellObj.element.classList.remove('flagged');
				cellObj.element.innerText = '';
				flagsPlaced--;
			}
			statusDiv.innerText = `Mines: ${MINES - flagsPlaced}`;
		}

		function reveal(r, c) {
			if (r < 0 || r >= ROWS || c < 0 || c >= COLS || grid[r][c].revealed || grid[r][c].flagged) return;

			const cellObj = grid[r][c];
			cellObj.revealed = true;
			cellObj.element.classList.remove('flagged');
			cellObj.element.classList.add('revealed');

			if (cellObj.mine) {
				cellObj.element.classList.add('exploded');
				cellObj.element.innerText = '💣';
				endGame(false);
				return;
			}

			if (cellObj.count > 0) {
				cellObj.element.innerText = cellObj.count;
				cellObj.element.classList.add(`val-${cellObj.count}`);
			} else {
				// Flood fill
				for (let i = -1; i <= 1; i++) {
					for (let j = -1; j <= 1; j++) {
						reveal(r + i, c + j);
					}
				}
			}
		}

		function checkWin() {
			if (gameOver) return;

			let unrevealedSafe = 0;
			for (let r = 0; r < ROWS; r++) {
				for (let c = 0; c < COLS; c++) {
					if (!grid[r][c].mine && !grid[r][c].revealed) {
						unrevealedSafe++;
					}
				}
			}

			if (unrevealedSafe === 0) {
				endGame(true);
			}
		}

		function endGame(win) {
			gameOver = true;
			if (win) {
				statusDiv.innerText = "Congratulations! You won!";
				statusDiv.style.color = "var(--signal)";
				for (let r = 0; r < ROWS; r++) {
					for (let c = 0; c < COLS; c++) {
						if (grid[r][c].mine && !grid[r][c].flagged) {
							grid[r][c].flagged = true;
							grid[r][c].element.classList.add('flagged');
							grid[r][c].element.innerText = '🚩';
						}
					}
				}
			} else {
				statusDiv.innerText = "Game Over!";
				statusDiv.style.color = "var(--danger)";
				for (let r = 0; r < ROWS; r++) {
					for (let c = 0; c < COLS; c++) {
						if (grid[r][c].mine && !grid[r][c].revealed) {
							grid[r][c].element.classList.add('mine');
							grid[r][c].element.innerText = '💣';
						}
						// Mark wrongly flagged cells
						if (!grid[r][c].mine && grid[r][c].flagged) {
							grid[r][c].element.style.backgroundColor = 'var(--danger)';
						}
					}
				}
			}
		}
	</script>
	<script src="theme-toggle.js"></script>
</body>

</html>
