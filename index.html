<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Simple Games</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="grotesk.css">
	<style>
		.page {
			min-height: 100vh;
			display: flex;
			flex-direction: column;
		}

		.shell {
			flex: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 48px 24px;
			gap: 8px;
		}

		.shell .title {
			font-family: var(--font-mark);
			text-align: center;
		}

		.shell .subtitle {
			color: var(--text-dim);
			font-size: 13px;
			letter-spacing: 0.03em;
			text-align: center;
			max-width: 560px;
			margin-bottom: 36px;
		}

		.game-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
			gap: 16px;
			width: 100%;
			max-width: 720px;
		}

		.game-card {
			background: var(--panel-2);
			padding: 28px 24px;
			display: flex;
			flex-direction: column;
			align-items: center;
			text-align: center;
			text-decoration: none;
			color: var(--text);
			border: 1px solid var(--line);
			transition: border-color 180ms ease, transform 180ms ease;
		}

		.game-card:hover {
			border-color: var(--signal);
			transform: translateY(-3px);
		}

		/* Flat mode collapses the card surface to the base background. */
		body[data-flat="true"] .game-card {
			background: var(--bg);
		}

		.game-icon {
			font-size: 2.6rem;
			line-height: 1;
			margin-bottom: 14px;
		}

		.game-title {
			font-size: 18px;
			letter-spacing: 0.04em;
			margin-bottom: 8px;
		}

		.game-card:hover .game-title {
			color: var(--signal);
		}

		.game-desc {
			color: var(--text-dim);
			font-size: 12px;
			letter-spacing: 0.03em;
			line-height: 1.7;
		}

		@media (prefers-reduced-motion: reduce) {
			.game-card {
				transition: none;
			}
		}
	</style>
</head>

<body>
	<main class="page frame">
		<header class="topbar">
			<div class="wordmark">APEX⁂</div>
			<nav class="nav" aria-label="Primary">
				<span class="on">/ Games</span>
			</nav>
			<div class="meta">
				<button class="ui-switch" id="theme-toggle" type="button" role="switch" aria-checked="false">
					<span class="switch-label">Theme</span>
					<span class="switch-track" aria-hidden="true"><span class="switch-thumb"></span></span>
				</button>
				<button class="ui-switch" id="flat-toggle" type="button" role="switch" aria-checked="false">
					<span class="switch-label">Surfaces</span>
					<span class="switch-track" aria-hidden="true"><span class="switch-thumb"></span></span>
				</button>
			</div>
		</header>

		<section class="shell">
			<h1 class="title">Simple Games</h1>
			<p class="subtitle">A collection of simple browser games. Built with AI assistance.</p>

			<div class="game-grid">
				<a href="sudoku.html" class="game-card">
					<div class="game-icon">🧩</div>
					<div class="game-title">Sudoku</div>
					<div class="game-desc">Fill the grid so that every row, column, and block contains 1–9.</div>
				</a>

				<a href="minesweeper.html" class="game-card">
					<div class="game-icon">💣</div>
					<div class="game-title">Minesweeper</div>
					<div class="game-desc">Flag mines and reveal safe zones to clear the board.</div>
				</a>
			</div>
		</section>
	</main>

	<script src="theme-toggle.js"></script>
</body>

</html>
